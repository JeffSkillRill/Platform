<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test — SAT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --teal:#3adbba; --teal-dark:#2bc4a4; --teal-darker:#1fa88c;
      --teal-light:#e8faf6; --teal-mid:#c0f2e8;
      --navy:#0d2137; --bg:#f2fbf8; --surface:#fff;
      --text:#0d2137; --text-muted:#4a7c6f; --text-faint:#8ab5ac;
      --border:#d4ede8; --green:#059669; --green-light:#ecfdf5;
      --red:#dc2626; --red-light:#fef2f2;
      --amber:#d97706; --amber-light:#fffbeb;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

    /* ===== TOP BAR ===== */
    .test-bar {
      background:var(--navy); height:58px;
      display:flex; align-items:center; padding:0 1.5rem; gap:1rem;
      position:sticky; top:0; z-index:100; flex-shrink:0;
    }
    .bar-test-name { font-family:'Space Grotesk',sans-serif; font-size:0.88rem; font-weight:700; color:#fff; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bar-module-badge {
      background:rgba(58,219,186,0.15); color:var(--teal);
      font-size:0.7rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
      padding:4px 11px; border-radius:99px; white-space:nowrap;
    }
    .bar-module-badge.math { background:rgba(99,102,241,0.15); color:#a5b4fc; }

    .timer-wrap {
      display:flex; align-items:center; gap:7px;
      background:rgba(255,255,255,0.08); border-radius:8px; padding:5px 12px;
    }
    .timer-wrap svg { width:14px; height:14px; color:var(--teal); flex-shrink:0; }
    .timer-num {
      font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:700; color:#fff;
      min-width:52px; text-align:center; transition:color 0.3s;
    }
    .timer-num.warn   { color:#fbbf24; }
    .timer-num.danger { color:#f87171; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .btn-end-module {
      background:var(--teal); color:var(--navy); border:none; border-radius:8px;
      font-family:'Inter',sans-serif; font-size:0.82rem; font-weight:700;
      padding:0.45rem 1.1rem; cursor:pointer; transition:background 0.12s; white-space:nowrap;
    }
    .btn-end-module:hover { background:var(--teal-dark); }

    /* Progress strip */
    .progress-strip { height:3px; background:rgba(58,219,186,0.12); flex-shrink:0; }
    .progress-fill  { height:100%; background:var(--teal); transition:width 0.3s; }

    /* Module stepper */
    .module-stepper {
      display:flex; align-items:center; justify-content:center; gap:0;
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:0.6rem 1.5rem; flex-shrink:0;
    }
    .step {
      display:flex; align-items:center; gap:6px;
      font-size:0.72rem; font-weight:600; color:var(--text-faint);
      padding:0.3rem 0.75rem;
    }
    .step-dot {
      width:20px; height:20px; border-radius:50%; border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:0.6rem; font-weight:700;
    }
    .step.done .step-dot   { background:var(--teal); border-color:var(--teal); color:var(--navy); }
    .step.active .step-dot { background:var(--navy); border-color:var(--navy); color:#fff; }
    .step.done,
    .step.active           { color:var(--text); }
    .step-line { width:32px; height:2px; background:var(--border); }
    .step-line.done { background:var(--teal); }

    /* ===== BODY ===== */
    .test-body { display:flex; flex:1; overflow:hidden; }

    /* Question grid sidebar */
    .q-grid-panel {
      width:196px; flex-shrink:0; background:var(--surface);
      border-right:1px solid var(--border);
      padding:1rem 0.75rem; overflow-y:auto;
      height:calc(100vh - 58px - 3px - 42px);
      position:sticky; top:103px;
    }
    .grid-section-lbl { font-size:0.62rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); margin-bottom:0.5rem; padding:0 0.2rem; }
    .q-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; margin-bottom:1rem; }
    .q-dot {
      aspect-ratio:1; border-radius:5px; display:flex; align-items:center; justify-content:center;
      font-size:0.6rem; font-weight:700; cursor:pointer;
      border:1.5px solid var(--border); background:var(--bg); color:var(--text-faint);
      transition:all 0.1s;
    }
    .q-dot:hover    { border-color:var(--teal); color:var(--teal-darker); }
    .q-dot.current  { background:var(--navy); color:#fff; border-color:var(--navy); }
    .q-dot.answered { background:var(--teal); color:var(--navy); border-color:var(--teal); }
    .q-dot.flagged  { background:var(--amber-light); color:var(--amber); border-color:var(--amber); }
    .grid-legend { display:flex; flex-direction:column; gap:5px; }
    .legend-row  { display:flex; align-items:center; gap:6px; font-size:0.67rem; color:var(--text-faint); }
    .legend-pip  { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

    /* Question area */
    .question-area { flex:1; overflow-y:auto; padding:2rem; max-width:860px; width:100%; margin:0 auto; }

    .q-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
    .q-counter { font-size:0.78rem; font-weight:600; color:var(--text-muted); }
    .q-flag-btn {
      display:flex; align-items:center; gap:5px;
      background:none; border:1.5px solid var(--border); border-radius:7px;
      padding:0.35rem 0.75rem; font-family:'Inter',sans-serif;
      font-size:0.75rem; font-weight:600; color:var(--text-muted); cursor:pointer;
      transition:all 0.12s;
    }
    .q-flag-btn:hover  { border-color:var(--amber); color:var(--amber); }
    .q-flag-btn.active { background:var(--amber-light); border-color:var(--amber); color:var(--amber); }
    .q-flag-btn svg { width:13px; height:13px; }

    .q-image { width:100%; max-height:260px; object-fit:contain; border-radius:10px; margin-bottom:1.25rem; border:1px solid var(--border); background:var(--teal-light); display:block; }

    .q-stem {
      font-size:1rem; line-height:1.75; color:var(--text);
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:1.25rem 1.5rem; margin-bottom:1.75rem;
    }

    .choices { display:flex; flex-direction:column; gap:0.6rem; margin-bottom:2rem; }
    .choice {
      display:flex; align-items:flex-start; gap:12px;
      padding:0.85rem 1rem; border:2px solid var(--border); border-radius:10px;
      background:var(--surface); cursor:pointer; transition:all 0.12s;
    }
    .choice:hover    { border-color:var(--teal-mid); background:var(--teal-light); }
    .choice.selected { border-color:var(--teal); background:var(--teal-light); }
    .choice-letter {
      width:28px; height:28px; border-radius:50%; border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:0.75rem; font-weight:700; flex-shrink:0; color:var(--text-muted);
      transition:all 0.12s;
    }
    .choice.selected .choice-letter { background:var(--teal); border-color:var(--teal); color:var(--navy); }
    .choice-text { font-size:0.95rem; line-height:1.5; color:var(--text); padding-top:3px; }

    .q-nav { display:flex; align-items:center; justify-content:space-between; padding-top:1rem; border-top:1px solid var(--border); }
    .btn-nav {
      display:flex; align-items:center; gap:6px;
      background:var(--teal-light); color:var(--teal-darker);
      border:1.5px solid var(--teal-mid); border-radius:9px;
      padding:0.55rem 1.1rem; font-family:'Inter',sans-serif;
      font-size:0.85rem; font-weight:600; cursor:pointer; transition:background 0.12s;
    }
    .btn-nav:hover    { background:var(--teal-mid); }
    .btn-nav:disabled { opacity:0.35; cursor:not-allowed; }
    .btn-nav svg { width:15px; height:15px; }
    .btn-next-module {
      background:var(--teal); color:var(--navy); border:none; border-radius:9px;
      padding:0.6rem 1.5rem; font-family:'Inter',sans-serif;
      font-size:0.85rem; font-weight:700; cursor:pointer; transition:background 0.12s;
    }
    .btn-next-module:hover { background:var(--teal-dark); }

    /* ===== OVERLAY SCREENS ===== */
    .overlay {
      display:none; position:fixed; inset:0; z-index:300;
      align-items:center; justify-content:center; padding:1.5rem;
    }
    .overlay.open { display:flex; }

    /* Module end confirm */
    .overlay-dim { background:rgba(13,33,55,0.6); }
    .modal-box {
      background:#fff; border-radius:18px; padding:2rem;
      width:100%; max-width:440px; box-shadow:0 12px 48px rgba(0,0,0,0.25);
    }
    .modal-box h2 { font-family:'Space Grotesk',sans-serif; font-size:1.15rem; font-weight:700; color:var(--text); margin-bottom:0.6rem; }
    .modal-box p  { font-size:0.88rem; color:var(--text-muted); line-height:1.6; margin-bottom:1.25rem; }
    .modal-stats  { display:flex; gap:0.75rem; margin-bottom:1.5rem; }
    .mstat { flex:1; background:var(--teal-light); border-radius:10px; padding:0.75rem; text-align:center; }
    .mstat-val { font-family:'Space Grotesk',sans-serif; font-size:1.2rem; font-weight:700; color:var(--teal-darker); }
    .mstat-lbl { font-size:0.68rem; color:var(--text-muted); margin-top:2px; }
    .modal-warn { background:var(--amber-light); border:1px solid #fcd34d; border-radius:8px; padding:0.65rem 0.9rem; font-size:0.8rem; color:var(--amber); margin-bottom:1.25rem; line-height:1.5; }
    .modal-actions { display:flex; gap:0.65rem; }
    .modal-actions .btn-nav   { flex:1; justify-content:center; }
    .modal-actions .btn-next-module { flex:1; }

    /* Break screen */
    .break-screen {
      background:var(--navy); flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:2rem;
    }
    .break-icon {
      width:72px; height:72px; border-radius:50%;
      background:rgba(58,219,186,0.12);
      display:flex; align-items:center; justify-content:center;
      margin-bottom:1.5rem;
    }
    .break-icon svg { width:34px; height:34px; color:var(--teal); }
    .break-title { font-family:'Space Grotesk',sans-serif; font-size:1.6rem; font-weight:700; color:#fff; margin-bottom:0.5rem; }
    .break-sub { font-size:0.9rem; color:rgba(255,255,255,0.5); margin-bottom:2rem; line-height:1.6; max-width:380px; }
    .break-timer-ring { position:relative; width:140px; height:140px; margin:0 auto 2rem; }
    .break-timer-ring svg { display:block; }
    .break-timer-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .break-timer-num { font-family:'Space Grotesk',sans-serif; font-size:2rem; font-weight:700; color:#fff; line-height:1; }
    .break-timer-lbl { font-size:0.68rem; color:rgba(255,255,255,0.4); margin-top:3px; }
    .break-progress { stroke-dasharray:351.86; stroke-dashoffset:0; transition:stroke-dashoffset 1s linear; }
    .break-next-btn {
      background:var(--teal); color:var(--navy); border:none; border-radius:10px;
      padding:0.75rem 2rem; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:700;
      cursor:pointer; transition:background 0.12s;
    }
    .break-next-btn:hover { background:var(--teal-dark); }
    .break-skip { margin-top:0.75rem; background:none; border:none; font-size:0.78rem; color:rgba(255,255,255,0.35); cursor:pointer; }
    .break-skip:hover { color:rgba(255,255,255,0.6); }

    /* Time-up screen */
    .timeup-screen { background:rgba(13,33,55,0.92); flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .timeup-screen h2 { font-family:'Space Grotesk',sans-serif; font-size:1.5rem; font-weight:700; color:var(--teal); margin-bottom:0.5rem; }
    .timeup-screen p  { color:rgba(255,255,255,0.6); font-size:0.9rem; margin-bottom:1.5rem; }
    .timeup-screen .btn-next-module { padding:0.75rem 2rem; font-size:0.95rem; }

    @media (max-width:640px) { .q-grid-panel { display:none; } .question-area { padding:1.25rem; } }
    @media (prefers-reduced-motion:reduce) { * { transition:none !important; animation:none !important; } }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="test-bar" id="testBar">
    <div class="bar-test-name" id="barTestName">Loading…</div>
    <span class="bar-module-badge" id="barModuleBadge">—</span>
    <div class="timer-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l4 2"/></svg>
      <div class="timer-num" id="timerNum">--:--</div>
    </div>
    <button class="btn-end-module" id="btnEndModule" onclick="openEndModal()">End module →</button>
  </div>

  <!-- Progress strip -->
  <div class="progress-strip"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- Module stepper -->
  <div class="module-stepper" id="moduleStepper"></div>

  <!-- Body -->
  <div class="test-body">
    <div class="q-grid-panel">
      <div class="grid-section-lbl" id="gridLabel">Questions</div>
      <div class="q-grid" id="qGrid"></div>
      <div class="grid-legend">
        <div class="legend-row"><div class="legend-pip" style="background:var(--teal);"></div>Answered</div>
        <div class="legend-row"><div class="legend-pip" style="background:var(--amber-light);border:1px solid var(--amber);"></div>Flagged</div>
        <div class="legend-row"><div class="legend-pip" style="background:var(--bg);border:1px solid var(--border);"></div>Unanswered</div>
      </div>
    </div>
    <div class="question-area" id="questionArea">
      <div style="text-align:center;padding:4rem;color:var(--text-faint);">Loading test…</div>
    </div>
  </div>

  <!-- End module confirm modal -->
  <div class="overlay overlay-dim" id="endModal">
    <div class="modal-box">
      <h2 id="endModalTitle">End this module?</h2>
      <div class="modal-stats" id="endModalStats"></div>
      <div class="modal-warn" id="endModalWarn" style="display:none;"></div>
      <p id="endModalDesc"></p>
      <div class="modal-actions">
        <button class="btn-nav" onclick="closeEndModal()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Keep reviewing
        </button>
        <button class="btn-next-module" id="endModalConfirmBtn" onclick="confirmEndModule()">Continue →</button>
      </div>
    </div>
  </div>

  <!-- Break screen -->
  <div class="overlay break-screen" id="breakScreen">
    <div class="break-icon">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1M4.22 4.22l.707.707M18.36 18.36l.707.707M1 12h1m20 0h1M4.22 19.78l.707-.707M18.36 5.64l.707-.707"/></svg>
    </div>
    <div class="break-title">10-Minute Break</div>
    <div class="break-sub">You've completed the Reading &amp; Writing sections.<br>Take a short break before Math begins.</div>
    <div class="break-timer-ring">
      <svg viewBox="0 0 140 140" width="140" height="140">
        <circle cx="70" cy="70" r="56" fill="none" stroke="rgba(58,219,186,0.1)" stroke-width="10"/>
        <circle cx="70" cy="70" r="56" fill="none" stroke="#3adbba" stroke-width="10"
          stroke-linecap="round" class="break-progress" id="breakRing"
          style="transform:rotate(-90deg);transform-origin:70px 70px;"/>
      </svg>
      <div class="break-timer-center">
        <div class="break-timer-num" id="breakTimerNum">10:00</div>
        <div class="break-timer-lbl">remaining</div>
      </div>
    </div>
    <button class="break-next-btn" id="breakNextBtn" onclick="endBreak()" disabled>Start Math section</button>
    <button class="break-skip" onclick="endBreak()">Skip break</button>
  </div>

  <!-- Time-up screen -->
  <div class="overlay timeup-screen" id="timeupScreen">
    <div class="break-icon">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l4 2"/></svg>
    </div>
    <h2>Time's up!</h2>
    <p id="timeupDesc">Your time for this module has ended.</p>
    <button class="btn-next-module" onclick="confirmEndModule(true)">Continue →</button>
  </div>

  <script>
    // ============================================================
    // PASTE YOUR SUPABASE CREDENTIALS HERE
    // ============================================================
    const SUPABASE_URL     = 'https://lsbpskmzffmaztczlokh.supabase.co';       // e.g. https://xyzxyz.supabase.co
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzYnBza216ZmZtYXp0Y3psb2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTc5NzMsImV4cCI6MjA5ODI3Mzk3M30.zRtly7a6XPKoU6BaZ2eftQxxOTFSUkw1wQ8A6-H1-tI'; // starts with eyJ...

    const db = {
      async getWhere(table, col, op, val, extra='') {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=${op}.${encodeURIComponent(val)}${extra}&select=*`, {
          headers:{ 'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      },
      async insert(table, data) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
          method:'POST',
          headers:{ 'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json','Prefer':'return=representation' },
          body:JSON.stringify(data)
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      }
    };

    // ================================================================
    // REAL SAT MODULE STRUCTURE
    // Module 1: R&W — 27 questions — 32 minutes
    // Module 2: R&W — 27 questions — 32 minutes
    // [10 minute break]
    // Module 3: Math — 22 questions — 35 minutes
    // Module 4: Math — 22 questions — 35 minutes
    // ================================================================
    const BREAK_AFTER_MODULE = 1;   // break happens after module index 1 (0-based = after RW mod 2)
    const BREAK_DURATION     = 600; // 10 minutes in seconds
    const LETTERS = ['A','B','C','D'];

    // State
    const session  = JSON.parse(localStorage.getItem('sat_user') || '{}');
    const params   = new URLSearchParams(window.location.search);
    const testId   = params.get('testId');
    const testName = params.get('testName') || 'SAT Practice Test';
    if (!session.id || !testId) window.location.href = 'student-tests.html';

    let allQuestions  = [];   // all questions from DB
    let modules       = [];   // [ [q,q,...], [q,q,...], [q,q,...], [q,q,...] ]
    let answers       = {};   // { questionId: chosenIndex }
    let flagged       = {};   // { questionId: true }
    let currentMod    = 0;    // 0-based module index
    let currentQIdx   = 0;    // question index within current module
    let timerSecs     = 0;
    let timerInterval = null;
    let breakInterval = null;
    let breakSecs     = BREAK_DURATION;
    let startTime     = Date.now();
    let modStartTimes = {};   // { modIndex: timestamp }
    const progressKey = `sat_test_progress_${session.id || 'guest'}_${testId || 'unknown'}`;

    function readSavedProgress() {
      try {
        const saved = JSON.parse(localStorage.getItem(progressKey) || 'null');
        return saved && saved.testId === testId ? saved : null;
      } catch (err) {
        return null;
      }
    }

    function saveProgress() {
      if (!session.id || !testId || !allQuestions.length) return;
      localStorage.setItem(progressKey, JSON.stringify({
        testId,
        testName,
        answers,
        flagged,
        currentMod,
        currentQIdx,
        timerSecs,
        startTime,
        savedAt: Date.now()
      }));
    }

    function clearSavedProgress() {
      localStorage.removeItem(progressKey);
    }

    window.addEventListener('beforeunload', saveProgress);

    // ---- Load test from Supabase ----
    async function loadTest() {
      document.getElementById('barTestName').textContent = testName;
      try {
        const qs = await loadQuestionsForSolving();
        if (!qs.length) {
          document.getElementById('questionArea').innerHTML =
            `<div style="text-align:center;padding:4rem;color:var(--text-faint);">This test has no questions yet.</div>`;
          return;
        }
        allQuestions = qs.map(q => {
          const safeQuestion = {
            ...q,
            choices: typeof q.choices === 'string' ? JSON.parse(q.choices) : q.choices
          };
          delete safeQuestion.correct;
          delete safeQuestion.explanation;
          return safeQuestion;
        });

        buildModules();
        renderStepper();
        const saved = readSavedProgress();
        if (saved) {
          answers = saved.answers || {};
          flagged = saved.flagged || {};
          startTime = saved.startTime || Date.now();
          const savedMod = Math.min(Math.max(Number(saved.currentMod) || 0, 0), modules.length - 1);
          startModule(savedMod, {
            questionIndex: Number(saved.currentQIdx) || 0,
            timerSecs: Number(saved.timerSecs) || undefined,
            restoring: true
          });
        } else {
          startModule(0);
        }

      } catch(err) {
        document.getElementById('questionArea').innerHTML =
          `<div style="text-align:center;padding:4rem;color:var(--red);">Failed to load. Check Supabase credentials.</div>`;
        console.error(err);
      }
    }

    async function loadQuestionsForSolving() {
      try {
        // Secure v2 exposes this view without correct answers.
        return await db.getWhere('student_questions','test_id','eq',testId,'&order=order_num.asc');
      } catch (err) {
        // Legacy fallback for the current prototype schema.
        return db.getWhere('questions','test_id','eq',testId,'&order=order_num.asc');
      }
    }

    // ---- Split questions into 4 modules using module_key from DB ----
    function buildModules() {
      // Questions now have module_key: 'rw1' | 'rw2' | 'math1' | 'math2'
      // Group by module_key, then order: rw1 → rw2 → math1 → math2
      const grouped = { rw1:[], rw2:[], math1:[], math2:[] };
      allQuestions.forEach(q => {
        const key = q.module_key || inferModuleKey(q);
        if (grouped[key]) grouped[key].push(q);
      });

      modules = [grouped.rw1, grouped.rw2, grouped.math1, grouped.math2]
        .filter(m => m.length > 0);
    }

    // Fallback for older tests that don't have module_key:
    // split by section into equal halves
    function inferModuleKey(q) {
      const rwQs   = allQuestions.filter(x => x.section === 'rw');
      const mathQs = allQuestions.filter(x => x.section === 'math');
      if (q.section === 'rw') {
        return rwQs.indexOf(q) < Math.ceil(rwQs.length / 2) ? 'rw1' : 'rw2';
      } else {
        return mathQs.indexOf(q) < Math.ceil(mathQs.length / 2) ? 'math1' : 'math2';
      }
    }

    // ---- Exact module definitions matching real Digital SAT ----
    // modules[] index → exact SAT module properties
    const SAT_MODULE_DEFS = [
      { label:'Module 1', sectionLabel:'Reading & Writing', section:'rw',   minutes:32, questions:27, badgeClass:'' },
      { label:'Module 2', sectionLabel:'Reading & Writing', section:'rw',   minutes:32, questions:27, badgeClass:'' },
      { label:'Module 3', sectionLabel:'Math',              section:'math',  minutes:35, questions:22, badgeClass:'math' },
      { label:'Module 4', sectionLabel:'Math',              section:'math',  minutes:35, questions:22, badgeClass:'math' },
    ];

    function getModDef(modIdx) {
      // Map local module index to SAT_MODULE_DEFS
      // If test has fewer modules (e.g. math-only), offset accordingly
      const hasRW   = allQuestions.some(q => q.section === 'rw');
      const hasMath = allQuestions.some(q => q.section === 'math');

      if (hasRW && hasMath) {
        // Full test: mod 0=RW1, 1=RW2, 2=Math1, 3=Math2
        return SAT_MODULE_DEFS[modIdx] || SAT_MODULE_DEFS[0];
      } else if (!hasRW && hasMath) {
        // Math-only test: mod 0=Math1, 1=Math2
        return SAT_MODULE_DEFS[2 + modIdx] || SAT_MODULE_DEFS[2];
      } else {
        // RW-only test: mod 0=RW1, 1=RW2
        return SAT_MODULE_DEFS[modIdx] || SAT_MODULE_DEFS[0];
      }
    }

    // ---- Render stepper ----
    function renderStepper() {
      const stepper = document.getElementById('moduleStepper');
      stepper.innerHTML = modules.map((m, i) => {
        const def    = getModDef(i);
        const status = i < currentMod ? 'done' : i === currentMod ? 'active' : '';
        const lineClass = i < currentMod ? 'done' : '';
        const sep = i < modules.length - 1
          ? `<div class="step-line ${lineClass}"></div>`
          : '';

        // Insert break indicator after module 1 (between RW and Math)
        const breakBadge = (i === 1 && modules.length > 2)
          ? `<div style="display:flex;align-items:center;gap:4px;"><div class="step-line ${lineClass}"></div><div style="font-size:0.6rem;font-weight:700;color:var(--amber);background:var(--amber-light);padding:2px 7px;border-radius:99px;white-space:nowrap;">10 min break</div></div>`
          : sep;

        return `
          <div class="step ${status}">
            <div class="step-dot">${i < currentMod ? '✓' : i+1}</div>
            <span>${def.sectionLabel} ${def.label}</span>
          </div>
          ${i < modules.length-1 ? breakBadge : ''}`;
      }).join('');
    }

    // ---- Start a module ----
    function startModule(modIdx, options = {}) {
      clearInterval(timerInterval);
      currentMod  = modIdx;
      currentQIdx = Number.isInteger(options.questionIndex) ? options.questionIndex : 0;
      if (!options.restoring) modStartTimes[modIdx] = Date.now();

      const def = getModDef(modIdx);
      timerSecs = options.timerSecs !== undefined
        ? Math.max(1, Number(options.timerSecs))
        : def.minutes * 60;

      const modQs = modules[modIdx] || [];
      currentQIdx = Math.min(Math.max(currentQIdx, 0), Math.max(modQs.length - 1, 0));

      // Update top bar
      const badge = document.getElementById('barModuleBadge');
      badge.textContent  = `${def.sectionLabel} — ${def.label}`;
      badge.className    = `bar-module-badge ${def.badgeClass}`;

      renderStepper();
      startTimer();
      renderGrid();
      renderQuestion();
      saveProgress();
    }

    // ---- Timer ----
    function startTimer() {
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        timerSecs--;
        updateTimerDisplay();
        saveProgress();
        if (timerSecs <= 0) {
          clearInterval(timerInterval);
          showTimeUp();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const m   = Math.floor(Math.abs(timerSecs) / 60);
      const s   = Math.abs(timerSecs) % 60;
      const el  = document.getElementById('timerNum');
      el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      el.className   = 'timer-num';
      if (timerSecs <= 300) el.classList.add('warn');
      if (timerSecs <= 60)  el.classList.add('danger');
    }

    function showTimeUp() {
      const def = getModDef(currentMod);
      document.getElementById('timeupDesc').textContent =
        `Time for ${def.sectionLabel} ${def.label} has ended.`;
      document.getElementById('timeupScreen').classList.add('open');
    }

    // ---- End module modal ----
    function openEndModal() {
      const modQs     = modules[currentMod] || [];
      const answered  = modQs.filter(q => answers[q.id] !== undefined).length;
      const unanswered = modQs.length - answered;
      const nFlagged  = modQs.filter(q => flagged[q.id]).length;
      const def       = getModDef(currentMod);
      const isLast    = currentMod === modules.length - 1;
      const nextIsBreak = (currentMod === 1 && modules.length > 2);

      document.getElementById('endModalTitle').textContent =
        isLast ? 'Submit the test?' : `End ${def.label}?`;

      document.getElementById('endModalStats').innerHTML = `
        <div class="mstat"><div class="mstat-val">${answered}</div><div class="mstat-lbl">Answered</div></div>
        <div class="mstat"><div class="mstat-val">${unanswered}</div><div class="mstat-lbl">Unanswered</div></div>
        <div class="mstat"><div class="mstat-val">${nFlagged}</div><div class="mstat-lbl">Flagged</div></div>`;

      const warnEl = document.getElementById('endModalWarn');
      if (unanswered > 0) {
        warnEl.style.display = 'block';
        warnEl.textContent = `⚠ ${unanswered} question${unanswered>1?'s are':' is'} unanswered. You cannot return to this module.`;
      } else {
        warnEl.style.display = 'none';
      }

      document.getElementById('endModalDesc').textContent = isLast
        ? 'Once submitted, you cannot change your answers.'
        : nextIsBreak
          ? 'After this module you will have a 10-minute break before Math begins.'
          : `You will move on to ${getModDef(currentMod+1).sectionLabel} ${getModDef(currentMod+1).label}.`;

      document.getElementById('endModalConfirmBtn').textContent = isLast
        ? 'Submit test'
        : nextIsBreak
          ? 'Go to break →'
          : 'Next module →';

      document.getElementById('endModal').classList.add('open');
    }

    function closeEndModal() {
      document.getElementById('endModal').classList.remove('open');
    }

    function confirmEndModule(fromTimeUp = false) {
      clearInterval(timerInterval);
      closeEndModal();
      document.getElementById('timeupScreen').classList.remove('open');

      const isLast      = currentMod === modules.length - 1;
      const nextIsBreak = (currentMod === 1 && modules.length > 2);

      if (isLast) {
        submitTest();
      } else if (nextIsBreak) {
        startBreak();
      } else {
        startModule(currentMod + 1);
      }
    }

    // ---- Break ----
    function startBreak() {
      breakSecs = BREAK_DURATION;
      document.getElementById('breakScreen').classList.add('open');
      document.getElementById('breakNextBtn').disabled = true;
      updateBreakDisplay();

      breakInterval = setInterval(() => {
        breakSecs--;
        updateBreakDisplay();
        if (breakSecs <= 0) {
          clearInterval(breakInterval);
          document.getElementById('breakNextBtn').disabled = false;
        }
      }, 1000);
    }

    function updateBreakDisplay() {
      const m   = Math.floor(breakSecs / 60);
      const s   = breakSecs % 60;
      document.getElementById('breakTimerNum').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

      // Update ring: full circle when full, shrinks as time passes
      const circ = 351.86;
      const pct  = breakSecs / BREAK_DURATION;
      document.getElementById('breakRing').style.strokeDashoffset =
        circ * (1 - pct);

      if (breakSecs <= 60)
        document.getElementById('breakNextBtn').disabled = false;
    }

    function endBreak() {
      clearInterval(breakInterval);
      document.getElementById('breakScreen').classList.remove('open');
      startModule(currentMod + 1);
    }

    // ---- Render question grid ----
    function renderGrid() {
      const modQs = modules[currentMod] || [];
      const def   = getModDef(currentMod);
      document.getElementById('gridLabel').textContent =
        `${def.sectionLabel} — ${def.label}`;

      document.getElementById('qGrid').innerHTML = modQs.map((q, i) => {
        let cls = '';
        if (i === currentQIdx)  cls = 'current';
        else if (flagged[q.id]) cls = 'flagged';
        else if (answers[q.id] !== undefined) cls = 'answered';
        return `<div class="q-dot ${cls}" onclick="goTo(${i})" title="Q${i+1}">${i+1}</div>`;
      }).join('');

      // Update progress
      const totalAnswered = Object.keys(answers).length;
      const totalQs       = allQuestions.length;
      document.getElementById('progressFill').style.width =
        totalQs ? (totalAnswered/totalQs*100)+'%' : '0%';
    }

    // ---- Render current question ----
    function renderQuestion() {
      const modQs = modules[currentMod] || [];
      const q     = modQs[currentQIdx];
      if (!q) return;

      const chosen    = answers[q.id];
      const isFlagged = flagged[q.id];
      const isLast    = currentQIdx === modQs.length - 1;
      const isLastMod = currentMod === modules.length - 1;

      // Global question number across all modules
      let globalNum = currentQIdx + 1;
      for (let m = 0; m < currentMod; m++) globalNum += (modules[m]||[]).length;

      const imgHtml = q.image_url
        ? `<img class="q-image" src="${q.image_url}" alt=""/>`
        : '';

      const choicesHtml = q.choices.map((c, i) => `
        <div class="choice ${chosen===i?'selected':''}" onclick="selectAnswer(${i})">
          <div class="choice-letter">${LETTERS[i]}</div>
          <div class="choice-text">${c}</div>
        </div>`).join('');

      const nextBtn = isLast
        ? `<button class="btn-next-module" onclick="openEndModal()">
            ${isLastMod ? 'Submit test' : 'End module →'}
           </button>`
        : `<button class="btn-nav" onclick="goTo(${currentQIdx+1})">
            Next
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
           </button>`;

      document.getElementById('questionArea').innerHTML = `
        <div class="q-header">
          <div class="q-counter">Question ${currentQIdx+1} of ${modQs.length}</div>
          <button class="q-flag-btn ${isFlagged?'active':''}" onclick="toggleFlag()">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 21V5a2 2 0 012-2h13.586a1 1 0 01.707 1.707L16 8l3.293 3.293A1 1 0 0119 13H5v8"/></svg>
            ${isFlagged ? 'Flagged' : 'Flag for review'}
          </button>
        </div>
        ${imgHtml}
        <div class="q-stem">${q.stem}</div>
        <div class="choices">${choicesHtml}</div>
        <div class="q-nav">
          <button class="btn-nav" onclick="goTo(${currentQIdx-1})" ${currentQIdx===0?'disabled':''}>
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            Previous
          </button>
          ${nextBtn}
        </div>`;

      renderGrid();
    }

    function selectAnswer(idx) {
      const q = (modules[currentMod]||[])[currentQIdx];
      if (!q) return;
      answers[q.id] = idx;
      renderQuestion();
      saveProgress();
    }

    function toggleFlag() {
      const q = (modules[currentMod]||[])[currentQIdx];
      if (!q) return;
      flagged[q.id] = !flagged[q.id];
      renderQuestion();
      saveProgress();
    }

    function goTo(idx) {
      const modQs = modules[currentMod] || [];
      if (idx < 0 || idx >= modQs.length) return;
      currentQIdx = idx;
      renderQuestion();
      saveProgress();
    }

    // ---- Submit test ----
    async function submitTest() {
      clearInterval(timerInterval);
      const timeTaken = Math.floor((Date.now() - startTime) / 1000);

      const finalAnswers = {};
      allQuestions.forEach(q => {
        finalAnswers[q.id] = answers[q.id] !== undefined ? answers[q.id] : null;
      });

      try {
        const [submission] = await db.insert('submissions', {
          student_id: session.id,
          test_id:    testId,
          answers:    finalAnswers,
          time_taken: timeTaken
        });

        clearSavedProgress();
        localStorage.setItem('sat_last_result', JSON.stringify({
          submissionId: submission?.id || null,
          testId, testName, questions: allQuestions,
          answers: finalAnswers, timeTaken
        }));

        window.location.href = 'student-test-results.html';

      } catch(err) {
        alert('Submission failed. Check your connection and try again.');
        console.error(err);
      }
    }

    loadTest();
  </script>
