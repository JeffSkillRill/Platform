<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tests - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#3adbba;--teal-dark:#2bc4a4;--teal-light:#e8faf6;--teal-mid:#c0f2e8;--navy:#0d2137;--bg:#f2fbf8;--surface:#fff;--text:#0d2137;--muted:#4a7c6f;--faint:#8ab5ac;--border:#d4ede8;--green:#059669;--amber:#d97706;--red:#dc2626;--side:230px}
    body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);background:var(--teal);display:flex;flex-direction:column}
    .brand{padding:1.35rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.25);font-family:"Space Grotesk",sans-serif;font-weight:700;color:var(--navy)}
    .brand small{display:block;font:600 .6rem Inter,sans-serif;letter-spacing:.08em;text-transform:uppercase;opacity:.55}
    .nav-label{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(13,33,55,.45);padding:.9rem 1.25rem .35rem}
    .nav-item{display:flex;align-items:center;padding:.62rem 1.25rem;color:rgba(13,33,55,.65);text-decoration:none;font-size:.88rem;font-weight:600}
    .nav-item:hover,.nav-item.active{background:rgba(255,255,255,.32);color:var(--navy)}
    .nav-item.active{border-left:3px solid var(--navy);padding-left:calc(1.25rem - 3px)}
    .main{margin-left:var(--side);min-height:100vh}
    .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 2rem;gap:1rem;position:sticky;top:0}
    .topbar-title{font-family:"Space Grotesk",sans-serif;font-weight:700}
    .topbar-actions{margin-left:auto;display:flex;gap:.6rem}
    .btn{border:0;border-radius:8px;padding:.55rem 1rem;font:700 .84rem Inter,sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .btn-primary{background:var(--teal);color:var(--navy)}
    .btn-primary:hover{background:var(--teal-dark)}
    .btn-soft{background:var(--teal-light);color:#1fa88c;border:1px solid var(--teal-mid)}
    .content{padding:1.75rem 2rem 3rem}
    .page-head{margin-bottom:1.35rem}
    h1{font-family:"Space Grotesk",sans-serif;font-size:1.45rem;margin-bottom:.25rem}
    .page-head p{font-size:.88rem;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;margin-bottom:1.4rem}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem}
    .stat strong{display:block;font-family:"Space Grotesk",sans-serif;font-size:1.6rem;color:#1fa88c}
    .stat span{font-size:.75rem;color:var(--muted)}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{background:var(--teal-light);color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;text-align:left;padding:.75rem 1rem}
    td{border-top:1px solid var(--border);padding:.9rem 1rem;font-size:.86rem;vertical-align:middle}
    .name{font-weight:700}
    .sub{font-size:.74rem;color:var(--faint);margin-top:2px}
    .badge{display:inline-flex;border-radius:999px;padding:2px 8px;font-size:.7rem;font-weight:800;text-transform:uppercase}
    .badge.published{background:#ecfdf5;color:var(--green)}
    .badge.draft{background:#fffbeb;color:var(--amber)}
    .empty{padding:3rem;text-align:center;color:var(--faint)}
    @media(max-width:840px){.sidebar{display:none}.main{margin-left:0}.grid{grid-template-columns:1fr}.content{padding:1.25rem}.topbar{padding:0 1rem}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">SAT Prep <small>Admin panel</small></div>
    <div class="nav-label">Main</div>
    <a class="nav-item" href="admin-dashboard.html">Dashboard</a>
    <a class="nav-item" href="admin-students.html">Students</a>
    <a class="nav-item active" href="admin-tests.html">Tests</a>
    <a class="nav-item" href="admin-leaderboard.html">Leaderboard</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title">Tests</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="createTest()">New test</button>
      </div>
    </div>
    <section class="content">
      <div class="page-head">
        <h1>Test library</h1>
        <p>Review published tests and continue building new SAT practice sets.</p>
      </div>
      <div class="grid">
        <div class="stat"><strong id="totalTests">-</strong><span>Total tests</span></div>
        <div class="stat"><strong id="publishedTests">-</strong><span>Published</span></div>
        <div class="stat"><strong id="totalQuestions">-</strong><span>Total questions</span></div>
      </div>
      <div class="panel">
        <table>
          <thead><tr><th>Test</th><th>Status</th><th>Questions</th><th>Created</th><th></th></tr></thead>
          <tbody id="testRows"><tr><td colspan="5" class="empty">Loading tests...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL='https://lsbpskmzffmaztczlokh.supabase.co';
    const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzYnBza216ZmZtYXp0Y3psb2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTc5NzMsImV4cCI6MjA5ODI3Mzk3M30.zRtly7a6XPKoU6BaZ2eftQxxOTFSUkw1wQ8A6-H1-tI';
    const session=JSON.parse(localStorage.getItem('sat_user')||'{}');
    if(session.role!=='admin') window.location.href='admin-login.html';

    function esc(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
    async function get(path){
      const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}});
      if(!res.ok) throw new Error(await res.text());
      return res.json();
    }
    function createTest(){
      localStorage.setItem('sat_draft_test',JSON.stringify({name:'',moduleQuestions:{rw1:[],rw2:[],math1:[],math2:[]}}));
      window.location.href='admin-test-builder.html';
    }
    async function load(){
      try{
        const [tests,questions]=await Promise.all([
          get('tests?select=*&order=created_at.desc'),
          get('questions?select=test_id,section')
        ]);
        document.getElementById('totalTests').textContent=tests.length;
        document.getElementById('publishedTests').textContent=tests.filter(t=>t.status==='published').length;
        document.getElementById('totalQuestions').textContent=questions.length;
        const rows=document.getElementById('testRows');
        if(!tests.length){rows.innerHTML='<tr><td colspan="5" class="empty">No tests yet.</td></tr>';return}
        rows.innerHTML=tests.map(t=>{
          const count=questions.filter(q=>q.test_id===t.id).length;
          const date=new Date(t.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
          return `<tr>
            <td><div class="name">${esc(t.name)}</div><div class="sub">${esc(t.id)}</div></td>
            <td><span class="badge ${esc(t.status)}">${esc(t.status)}</span></td>
            <td>${count}</td>
            <td>${date}</td>
            <td><a class="btn btn-soft" href="admin-test-builder.html">Open builder</a></td>
          </tr>`;
        }).join('');
      }catch(err){
        document.getElementById('testRows').innerHTML='<tr><td colspan="5" class="empty">Could not load tests from Supabase.</td></tr>';
      }
    }
    load();
  </script>
</body>
</html>
