<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tests - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin-tests.css">
  <link rel="stylesheet" href="css/mobile.css">
  <meta name="theme-color" content="#3CDBBF">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/brand/4prep-logo-color-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/logo.css">
  <script src="js/logo.js" defer></script>
  <script src="js/theme.js" defer></script>
</head>
<body data-auth-role="admin">
  <aside class="sidebar">
    <a class="brand brand-lockup" href="admin-dashboard.html" aria-label="4Prep admin dashboard"><fourprep-logo size="40" variant="white"></fourprep-logo><span class="brand-copy">4Prep <small>Admin panel</small></span></a>
    <div class="nav-label">Main</div>
    <a class="nav-item" href="admin-dashboard.html">Dashboard</a>
    <a class="nav-item" href="admin-students.html">Students</a>
    <a class="nav-item" href="admin-classes.html">Classes</a>
    <a class="nav-item active" href="admin-tests.html">Tests</a>
    <a class="nav-item" href="admin-question-bank.html">Question Bank</a>
    <a class="nav-item" href="admin-vocabulary.html">Vocabulary</a>
    <a class="nav-item" href="admin-leaderboard.html">Leaderboard</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title">Tests</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="createTest()">New test</button>
      </div>
    </div>
    <section class="content">
      <div class="page-head">
        <h1>Test library</h1>
        <p>Review published tests and continue building new SAT practice sets.</p>
      </div>
      <div class="grid">
        <div class="stat"><strong id="totalTests">-</strong><span>Total tests</span></div>
        <div class="stat"><strong id="publishedTests">-</strong><span>Published</span></div>
        <div class="stat"><strong id="totalQuestions">-</strong><span>Total questions</span></div>
      </div>
      <div class="panel">
        <table>
          <thead><tr><th>Test</th><th>Status</th><th>Questions</th><th>Created</th><th></th></tr></thead>
          <tbody id="testRows"><tr><td colspan="5" class="empty">Loading tests...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/admin-tests.js"></script>
  <script src="js/mobile-nav.js" defer></script>
</body>
</html>
