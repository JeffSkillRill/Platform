<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Results - SAT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/student-results.css">
</head>
<body data-auth-role="student">
  <aside class="sidebar">
    <div class="brand">SAT <span>PREP</span></div>
    <div class="nav-label">Menu</div>
    <a class="nav-item" href="student-home.html">Home</a>
    <a class="nav-item" href="student-tests.html">My tests</a>
    <a class="nav-item active" href="student-results.html">Results</a>
    <a class="nav-item" href="student-leaderboard.html">Leaderboard</a>
    <div class="student" id="studentName">Student</div>
  </aside>
  <main class="main">
    <div class="topbar"><div class="topbar-title">Results</div></div>
    <section class="content">
      <div class="head">
        <h1>Result history</h1>
        <p>Review your submitted tests and reopen the full answer breakdown.</p>
      </div>
      <div class="panel">
        <table>
          <thead><tr><th>Test</th><th>Score</th><th>Correct</th><th>Time</th><th>Submitted</th><th></th></tr></thead>
          <tbody id="rows"><tr><td colspan="6" class="empty">Loading results...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/student-results.js"></script>
</body>
</html>
