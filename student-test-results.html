<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Results — 4Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/student-test-results.css">
  <meta name="theme-color" content="#3CDBBF">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/brand/4prep-logo-color-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/logo.css">
  <link rel="stylesheet" href="css/animations.css?v=20260717-navfix">
  <script src="js/animations.js?v=20260717"></script>
  <script src="js/logo.js" defer></script>
</head>
<body data-auth-role="student">

  <div class="topbar">
    <a class="brand-lockup" href="student-home.html" aria-label="4Prep student home"><fourprep-logo size="36" variant="white"></fourprep-logo></a>
    <div class="topbar-name" id="topbarName">Test Results</div>
    <button class="btn-back" onclick="window.location.href='student-home.html'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12h18M3 12l7-7M3 12l7 7"/></svg>
      Back to home
    </button>
    <button class="btn-back" onclick="downloadReport()">
      Download report
    </button>
  </div>

  <div class="content">

    <!-- Summary card -->
    <div class="summary-card">
      <div class="summary-top">
        <div>
          <div class="summary-title" id="summaryTitle">—</div>
          <div class="summary-sub" id="summarySub">—</div>
        </div>
        <div class="time-badge" id="timeBadge">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l4 2"/></svg>
          —
        </div>
      </div>
      <div class="summary-stats" id="summaryStats" data-skeleton="stat"></div>
    </div>

    <div id="breakdownPanel" data-skeleton="card" data-skeleton-count="2"></div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All questions</button>
      <button class="filter-btn" onclick="setFilter('correct',this)">✓ Correct</button>
      <button class="filter-btn" onclick="setFilter('wrong',this)">✗ Wrong</button>
      <button class="filter-btn" onclick="setFilter('skipped',this)">— Skipped</button>
    </div>

    <!-- Questions list -->
    <div id="questionList" data-skeleton="list-item" data-skeleton-count="5"></div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/student-test-results.js"></script>
</body>
</html>
