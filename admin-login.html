<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — SAT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin-login.css">
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0d2137" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="brand-name">SAT <span>Prep</span></div>
    </div>

    <div class="badge">Admin access</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to manage students and tests.</p>
    <div class="divider"></div>

    <div class="global-error" id="globalError">Incorrect username or password. Try again.</div>

    <form id="adminLoginForm" novalidate>
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" spellcheck="false"/>
      <p class="error-msg" id="usernameError">Username is required.</p>

      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">Show</button>
      </div>
      <div class="pw-gap"></div>
      <p class="error-msg" id="passwordError">Password is required.</p>

      <button type="submit" class="btn-login" id="submitBtn">Sign in</button>
    </form>

    <p class="footer-link">Student? <a href="student-login.html">Go to student login →</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/admin-login.js"></script>
</body>
</html>
