<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — 4Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin-login.css">
  <meta name="theme-color" content="#3CDBBF">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/brand/4prep-logo-color-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/logo.css">
  <script src="js/logo.js" defer></script>
</head>
<body>
  <div class="card">
    <a class="brand brand-lockup" href="index.html" aria-label="4Prep home">
      <fourprep-logo size="40" variant="color"></fourprep-logo>
      <span class="brand-name">4Prep</span>
    </a>

    <div class="badge">Admin access</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to manage students and tests.</p>
    <div class="divider"></div>

    <div class="global-error" id="globalError">Incorrect username or password. Try again.</div>

    <form id="adminLoginForm" novalidate>
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" spellcheck="false"/>
      <p class="error-msg" id="usernameError">Username is required.</p>

      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">Show</button>
      </div>
      <div class="pw-gap"></div>
      <p class="error-msg" id="passwordError">Password is required.</p>

      <button type="submit" class="btn-login" id="submitBtn">Sign in</button>
    </form>

    <p class="footer-link">Student? <a href="student-login.html">Go to student login →</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/admin-login.js"></script>
</body>
</html>
