<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin-leaderboard.css">
</head>
<body data-auth-role="admin">
  <aside class="sidebar">
    <div class="brand">SAT Prep <small>Admin panel</small></div>
    <div class="nav-label">Main</div>
    <a class="nav-item" href="admin-dashboard.html">Dashboard</a>
    <a class="nav-item" href="admin-students.html">Students</a>
    <a class="nav-item" href="admin-tests.html">Tests</a>
    <a class="nav-item active" href="admin-leaderboard.html">Leaderboard</a>
  </aside>
  <main class="main">
    <div class="topbar"><div class="topbar-title">Leaderboard</div></div>
    <section class="content">
      <div class="head">
        <div>
          <h1>Student rankings</h1>
          <p>Ranks are calculated from submitted tests in Supabase.</p>
        </div>
        <select id="testFilter" onchange="render()"><option value="overall">Overall best score</option></select>
      </div>
      <div class="panel">
        <table>
          <thead><tr><th>Rank</th><th>Student</th><th>Test</th><th>Score</th><th>Correct</th><th>Time</th><th>Submitted</th></tr></thead>
          <tbody id="rows"><tr><td colspan="7" class="empty">Loading leaderboard...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/admin-leaderboard.js"></script>
</body>
</html>
