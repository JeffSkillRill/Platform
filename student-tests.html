<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tests — SAT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --teal:#3adbba; --teal-dark:#2bc4a4; --teal-darker:#1fa88c;
      --teal-light:#e8faf6; --teal-mid:#c0f2e8; --navy:#0d2137;
      --bg:#f2fbf8; --surface:#ffffff; --text:#0d2137;
      --text-muted:#4a7c6f; --text-faint:#8ab5ac; --border:#d4ede8;
      --green:#059669; --green-light:#ecfdf5;
      --amber:#d97706; --amber-light:#fffbeb;
      --sidebar-w:230px;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    .sidebar { position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w); background:var(--navy); display:flex; flex-direction:column; z-index:100; }
    .sidebar-logo { padding:1.4rem 1.25rem 1.1rem; border-bottom:1px solid rgba(255,255,255,0.07); margin-bottom:0.5rem; }
    .logo-wrap { display:flex; align-items:center; gap:9px; }
    .logo-icon { width:32px; height:32px; background:var(--teal); border-radius:9px; display:flex; align-items:center; justify-content:center; }
    .logo-icon svg { width:17px; height:17px; }
    .logo-text { font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:700; color:#fff; line-height:1.1; }
    .logo-text small { display:block; font-size:0.6rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.4); }
    .nav-label { font-size:0.62rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.25); padding:0.75rem 1.25rem 0.3rem; }
    .nav-item { display:flex; align-items:center; gap:9px; padding:0.55rem 1.25rem; font-size:0.875rem; font-weight:500; color:rgba(255,255,255,0.55); text-decoration:none; cursor:pointer; transition:background 0.12s,color 0.12s; position:relative; }
    .nav-item:hover { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.9); }
    .nav-item.active { background:rgba(58,219,186,0.15); color:#fff; font-weight:600; }
    .nav-item.active::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--teal); border-radius:0 2px 2px 0; }
    .nav-icon { width:17px; height:17px; flex-shrink:0; opacity:0.7; }
    .nav-item.active .nav-icon { opacity:1; }
    .sidebar-bottom { margin-top:auto; padding:1rem 1rem 1.25rem; border-top:1px solid rgba(255,255,255,0.07); }
    .student-chip { display:flex; align-items:center; gap:9px; }
    .s-avatar { width:30px; height:30px; border-radius:50%; background:var(--teal); display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; color:var(--navy); flex-shrink:0; }
    .s-name { font-size:0.8rem; font-weight:600; color:#fff; }
    .s-role { font-size:0.65rem; color:rgba(255,255,255,0.35); }

    .main { margin-left:var(--sidebar-w); min-height:100vh; }
    .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 2rem; height:62px; display:flex; align-items:center; position:sticky; top:0; z-index:50; }
    .topbar-title { font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:700; }

    .content { padding:1.75rem 2rem 3rem; max-width:760px; }
    .page-head { margin-bottom:1.5rem; }
    .page-head h1 { font-family:'Space Grotesk',sans-serif; font-size:1.4rem; font-weight:700; margin-bottom:0.2rem; }
    .page-head p { font-size:0.85rem; color:var(--text-muted); }

    .test-card {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:14px; padding:1.25rem 1.5rem;
      margin-bottom:0.85rem; display:flex; align-items:center; gap:1.25rem;
      transition:border-color 0.15s, box-shadow 0.15s;
    }
    .test-card:hover { border-color:var(--teal); box-shadow:0 0 0 3px rgba(58,219,186,0.1); }

    .test-icon {
      width:44px; height:44px; border-radius:12px;
      background:var(--teal-light); display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .test-icon svg { width:20px; height:20px; color:var(--teal-darker); }

    .test-info { flex:1; min-width:0; }
    .test-name { font-family:'Space Grotesk',sans-serif; font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:0.25rem; }
    .test-meta { font-size:0.78rem; color:var(--text-muted); display:flex; gap:0.75rem; flex-wrap:wrap; }
    .test-meta span { display:flex; align-items:center; gap:4px; }

    .btn-start {
      background:var(--teal); color:var(--navy); border:none;
      border-radius:9px; padding:0.55rem 1.25rem;
      font-family:'Inter',sans-serif; font-size:0.85rem; font-weight:700;
      cursor:pointer; transition:background 0.12s; white-space:nowrap; flex-shrink:0;
    }
    .btn-start:hover { background:var(--teal-dark); }

    .empty-state { text-align:center; padding:4rem 2rem; color:var(--text-faint); }
    .empty-state svg { width:48px; height:48px; margin-bottom:1rem; color:var(--teal-mid); }
    .empty-state p { font-size:0.88rem; line-height:1.6; }

    .spinner { display:flex; justify-content:center; padding:3rem; }
    .spin { width:24px; height:24px; border:2.5px solid var(--teal-mid); border-top-color:var(--teal); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0d2137" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div class="logo-text">SAT Prep <small>Student portal</small></div>
      </div>
    </div>
    <p class="nav-label">Menu</p>
    <a class="nav-item" href="student-home.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Home
    </a>
    <a class="nav-item active" href="student-tests.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      My Tests
    </a>
    <a class="nav-item" href="student-results.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Results
    </a>
    <a class="nav-item" href="student-leaderboard.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
      Leaderboard
    </a>
    <div class="sidebar-bottom">
      <div class="student-chip">
        <div class="s-avatar" id="sAvatar">ST</div>
        <div><div class="s-name" id="sName">Student</div><div class="s-role">Student</div></div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">My Tests</span>
    </div>
    <div class="content">
      <div class="page-head">
        <h1>Available tests</h1>
        <p>Click a test to start. Your timer begins immediately when you open a test.</p>
      </div>
      <div id="testList"><div class="spinner"><div class="spin"></div></div></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL     = 'https://lsbpskmzffmaztczlokh.supabase.co';       // e.g. https://xyzxyz.supabase.co
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzYnBza216ZmZtYXp0Y3psb2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTc5NzMsImV4cCI6MjA5ODI3Mzk3M30.zRtly7a6XPKoU6BaZ2eftQxxOTFSUkw1wQ8A6-H1-tI'; // starts with eyJ...
    const session = JSON.parse(localStorage.getItem('sat_user') || '{}');
    if (!session.id) window.location.href = 'student-login.html';

    // Set name
    const initials = session.name ? session.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() : 'ST';
    document.getElementById('sAvatar').textContent = initials;
    document.getElementById('sName').textContent   = session.name || 'Student';

    async function loadTests() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/tests?status=eq.published&select=*&order=created_at.desc`, {
          headers:{ 'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}` }
        });
        const tests = await res.json();
        const list  = document.getElementById('testList');

        if (!tests.length) {
          list.innerHTML = `
            <div class="empty-state">
              <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              <p>No tests available yet.<br>Your instructor hasn't published any tests.</p>
            </div>`;
          return;
        }

        // Load question counts per test
        const qRes = await fetch(`${SUPABASE_URL}/rest/v1/questions?select=test_id,section`, {
          headers:{ 'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}` }
        });
        const allQs = await qRes.json();

        list.innerHTML = tests.map(t => {
          const qs    = allQs.filter(q => q.test_id === t.id);
          const math  = qs.filter(q => q.section === 'math').length;
          const rw    = qs.filter(q => q.section === 'rw').length;
          const total = qs.length;
          const date  = new Date(t.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

          // Estimate time: rw=64min, math=70min
          const mins = (rw > 0 ? 64 : 0) + (math > 0 ? 70 : 0);

          return `
            <div class="test-card">
              <div class="test-icon">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              </div>
              <div class="test-info">
                <div class="test-name">${t.name}</div>
                <div class="test-meta">
                  <span>📝 ${total} questions</span>
                  ${rw   ? `<span>📖 R&amp;W: ${rw}</span>`  : ''}
                  ${math ? `<span>🔢 Math: ${math}</span>` : ''}
                  <span>⏱ ~${mins} min</span>
                  <span>📅 ${date}</span>
                </div>
              </div>
              <button class="btn-start" onclick="startTest('${t.id}','${t.name.replace(/'/g,"\\'")}')">
                Start →
              </button>
            </div>`;
        }).join('');

      } catch(err) {
        document.getElementById('testList').innerHTML =
          `<div class="empty-state"><p>Failed to load tests. Check Supabase credentials.</p></div>`;
      }
    }

    function startTest(testId, testName) {
      if (!confirm(`Start "${testName}"?\n\nThe timer will begin immediately. Make sure you have enough time.`)) return;
      window.location.href = `student-test-solve.html?testId=${testId}&testName=${encodeURIComponent(testName)}`;
    }

    loadTests();
  </script>
</body>
</html>
