<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard - SAT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#3adbba;--teal-light:#e8faf6;--navy:#0d2137;--bg:#f2fbf8;--surface:#fff;--text:#0d2137;--muted:#4a7c6f;--faint:#8ab5ac;--border:#d4ede8;--green:#059669;--side:230px}
    body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);background:var(--navy);display:flex;flex-direction:column}
    .brand{padding:1.35rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.08);font-family:"Space Grotesk",sans-serif;font-weight:700;color:#fff}
    .brand span{background:var(--teal);color:var(--navy);font-size:.62rem;padding:2px 6px;border-radius:4px;margin-left:4px}
    .nav-label{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);padding:.9rem 1.25rem .35rem}
    .nav-item{display:flex;align-items:center;padding:.62rem 1.25rem;color:rgba(255,255,255,.58);text-decoration:none;font-size:.88rem;font-weight:600}
    .nav-item:hover,.nav-item.active{background:rgba(58,219,186,.14);color:#fff}
    .nav-item.active{border-left:3px solid var(--teal);padding-left:calc(1.25rem - 3px)}
    .student{margin-top:auto;padding:1rem;color:#fff;font-size:.82rem}
    .main{margin-left:var(--side);min-height:100vh}
    .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 2rem;position:sticky;top:0}
    .topbar-title{font-family:"Space Grotesk",sans-serif;font-weight:700}
    .content{padding:1.75rem 2rem 3rem;max-width:900px}
    .head{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:1.35rem}
    h1{font-family:"Space Grotesk",sans-serif;font-size:1.45rem;margin-bottom:.25rem}.head p{font-size:.88rem;color:var(--muted)}
    select{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:.55rem .8rem;font:600 .84rem Inter,sans-serif;color:var(--text)}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{background:var(--teal-light);color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;text-align:left;padding:.75rem 1rem}
    td{border-top:1px solid var(--border);padding:.9rem 1rem;font-size:.86rem;vertical-align:middle}
    tr.me{background:rgba(58,219,186,.09)}
    .rank{font-family:"Space Grotesk",sans-serif;font-size:1rem;font-weight:700;color:var(--muted)}
    .name{font-weight:700}.sub{font-size:.74rem;color:var(--faint);margin-top:2px}
    .score{font-family:"Space Grotesk",sans-serif;font-weight:700;color:var(--green)}
    .tag{display:inline-flex;background:var(--teal);color:var(--navy);border-radius:4px;padding:1px 6px;font-size:.62rem;font-weight:800;margin-left:6px;text-transform:uppercase}
    .empty{padding:3rem;text-align:center;color:var(--faint)}
    @media(max-width:760px){.sidebar{display:none}.main{margin-left:0}.content{padding:1.25rem}.topbar{padding:0 1rem}.head{display:block}.head select{margin-top:1rem;width:100%}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">SAT <span>PREP</span></div>
    <div class="nav-label">Menu</div>
    <a class="nav-item" href="student-home.html">Home</a>
    <a class="nav-item" href="student-tests.html">My tests</a>
    <a class="nav-item" href="student-results.html">Results</a>
    <a class="nav-item active" href="student-leaderboard.html">Leaderboard</a>
    <div class="student" id="studentName">Student</div>
  </aside>
  <main class="main">
    <div class="topbar"><div class="topbar-title">Leaderboard</div></div>
    <section class="content">
      <div class="head">
        <div>
          <h1>Class leaderboard</h1>
          <p>Compare best submitted scores across the class.</p>
        </div>
        <select id="testFilter" onchange="render()"><option value="overall">Overall best score</option></select>
      </div>
      <div class="panel">
        <table>
          <thead><tr><th>Rank</th><th>Student</th><th>Test</th><th>Score</th><th>Correct</th><th>Submitted</th></tr></thead>
          <tbody id="rows"><tr><td colspan="6" class="empty">Loading leaderboard...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>
  <script>
    const SUPABASE_URL='https://lsbpskmzffmaztczlokh.supabase.co';
    const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzYnBza216ZmZtYXp0Y3psb2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTc5NzMsImV4cCI6MjA5ODI3Mzk3M30.zRtly7a6XPKoU6BaZ2eftQxxOTFSUkw1wQ8A6-H1-tI';
    const session=JSON.parse(localStorage.getItem('sat_user')||'{}');
    if(!session.id) window.location.href='student-login.html';
    document.getElementById('studentName').textContent=session.name||'Student';
    let users=[],tests=[],questions=[],submissions=[],scored=[];
    function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function parseJson(v){if(!v)return{};if(typeof v==='object')return v;try{const p=JSON.parse(v);return typeof p==='string'?JSON.parse(p):p}catch{return{}}}
    async function get(path){const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}});if(!res.ok)throw new Error(await res.text());return res.json()}
    function score(sub){
      const qs=questions.filter(q=>q.test_id===sub.test_id);
      const answers=parseJson(sub.answers);
      let correct=0;
      qs.forEach(q=>{if(answers[q.id]!==null&&answers[q.id]!==undefined&&Number(answers[q.id])===Number(q.correct))correct++});
      return {score:qs.length?Math.round(400+(correct/qs.length)*1200):0,correct,total:qs.length};
    }
    function bestRows(){
      const filter=document.getElementById('testFilter').value;
      const source=filter==='overall'?scored:scored.filter(s=>s.test_id===filter);
      const best=new Map();
      source.forEach(item=>{const prev=best.get(item.student_id);if(!prev||item.score>prev.score)best.set(item.student_id,item)});
      return [...best.values()].sort((a,b)=>b.score-a.score||b.correct-a.correct);
    }
    function render(){
      const body=document.getElementById('rows');
      const rows=bestRows();
      if(!rows.length){body.innerHTML='<tr><td colspan="6" class="empty">No submitted tests yet.</td></tr>';return}
      body.innerHTML=rows.map((r,i)=>{
        const user=users.find(u=>u.id===r.student_id)||{};
        const test=tests.find(t=>t.id===r.test_id)||{};
        const submitted=new Date(r.submitted_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        const isMe=r.student_id===session.id;
        return `<tr class="${isMe?'me':''}">
          <td><span class="rank">#${i+1}</span></td>
          <td><div class="name">${esc(user.full_name||'Student')}${isMe?'<span class="tag">You</span>':''}</div><div class="sub">@${esc(user.username||'student')}</div></td>
          <td>${esc(test.name||'Untitled test')}</td>
          <td><span class="score">${r.score}</span></td>
          <td>${r.correct}/${r.total}</td>
          <td>${submitted}</td>
        </tr>`;
      }).join('');
    }
    async function load(){
      try{
        [users,tests,questions,submissions]=await Promise.all([
          get('users?role=eq.student&select=id,full_name,username'),
          get('tests?select=id,name,status'),
          get('questions?select=id,test_id,correct'),
          get('submissions?select=*&order=submitted_at.desc')
        ]);
        document.getElementById('testFilter').innerHTML='<option value="overall">Overall best score</option>'+tests.map(t=>`<option value="${esc(t.id)}">${esc(t.name)}</option>`).join('');
        scored=submissions.map(s=>({...s,...score(s)}));
        render();
      }catch(err){
        document.getElementById('rows').innerHTML='<tr><td colspan="6" class="empty">Could not load leaderboard data.</td></tr>';
      }
    }
    load();
  </script>
</body>
</html>
