<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard - 4Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/student-leaderboard.css">
  <link rel="stylesheet" href="css/mobile.css?v=20260720-qa1">
  <meta name="theme-color" content="#3CDBBF">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/brand/4prep-logo-color-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/logo.css">
  <link rel="stylesheet" href="css/animations.css?v=20260717-navfix">
  <script src="js/animations.js?v=20260717"></script>
  <script src="js/logo.js" defer></script>
  <script src="js/theme.js" defer></script>
</head>
<body data-auth-role="student">
  <aside class="sidebar">
    <a class="brand brand-lockup" href="student-home.html" aria-label="4Prep student home"><fourprep-logo size="40" variant="white"></fourprep-logo><span class="brand-copy">4Prep <small>Student portal</small></span></a>
    <div class="nav-label">Menu</div>
    <a class="nav-item" href="student-home.html">Home</a>
    <a class="nav-item" href="student-tests.html">My tests</a>
    <a class="nav-item" href="student-classes.html">Classes</a>
    <a class="nav-item" href="student-question-bank.html">Question Bank</a>
    <a class="nav-item" href="student-vocabulary.html">Vocabulary</a>
    <a class="nav-item" href="student-practice.html">Practice</a>
    <a class="nav-item" href="student-results.html">Results</a>
    <a class="nav-item active" href="student-leaderboard.html">Leaderboard</a>
    <div class="student" id="studentName">Student</div>
  </aside>
  <main class="main">
    <div class="topbar"><div class="topbar-title">Leaderboard</div></div>
    <section class="content">
      <div class="head">
        <div>
          <h1>Class leaderboard</h1>
          <p>Compare best submitted scores across the class.</p>
        </div>
        <div class="filters">
          <select id="testFilter"><option value="overall">Overall best score</option></select>
          <select id="periodFilter">
            <option value="all">All time</option>
            <option value="month">This month</option>
            <option value="week">This week</option>
          </select>
        </div>
      </div>
      <div class="podium" id="podium"></div>
      <div class="panel">
        <table>
          <thead><tr><th>Rank</th><th>Student</th><th>Test</th><th>Score</th><th>Correct</th><th>Submitted</th></tr></thead>
          <tbody id="rows" data-skeleton="table-row" data-skeleton-count="6" data-skeleton-columns="6"><tr><td colspan="6" class="empty">Loading leaderboard...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/student-leaderboard.js"></script>
  <script src="js/mobile-nav.js?v=20260720-qa1" defer></script>
</body>
</html>
